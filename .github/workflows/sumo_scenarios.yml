name: SUMO Scenarios

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  scenarios:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: 3.13
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install SUMO
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:sumo/stable
          sudo apt-get update
          sudo apt-get install -y sumo sumo-tools
          echo "SUMO_HOME=/usr/share/sumo" >> $GITHUB_ENV
      - name: Verify SUMO installation
        run: sumo --version
      - name: Demo — baseline
        run: python run.py configurations/demo_sumo_baseline_config.json --headless
      - name: Demo — fixed-cycle
        run: python run.py configurations/demo_sumo_fixed_cycle_config.json --headless
      - name: Demo — max-pressure
        run: python run.py configurations/demo_sumo_max_pressure_config.json --headless
      - name: Demo — priority-pass
        run: python run.py configurations/demo_sumo_priority_pass_config.json --headless
      - name: Demo — priority-pass full state
        run: python run.py configurations/demo_sumo_priority_pass_full_state_config.json --headless
      - name: Vienna pilot — baseline
        run: python run.py configurations/vienna_sumo_baseline_config.json --headless
      - name: Vienna pilot — fixed-cycle
        run: python run.py configurations/vienna_sumo_fixed_cycle_config.json --headless
      - name: Vienna pilot — max-pressure
        run: python run.py configurations/vienna_sumo_max_pressure_config.json --headless
      - name: Vienna pilot — priority-pass
        run: python run.py configurations/vienna_sumo_priority_pass_config.json --headless
