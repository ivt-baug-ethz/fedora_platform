name: Formatting

on:
    push:
        branches:
            - main
            - dev
    pull_request:
        types: [opened, synchronize]

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: psf/black@stable
